name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: npm install
      - run: npm install @capacitor/cli @capacitor/core @capacitor/android
      - run: echo "{}" > .z-ai-config
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - run: echo '{"appId":"com.echo.wuxiabrasileirado","appName":"ECHO","webDir":"out","server":{"androidScheme":"https"}}' > capacitor.config.json
      - run: npx cap add android
      - run: npx cap sync android
      - run: cd android && ./gradlew assembleDebug
      - run: find android/app/build/outputs/ -type f
      - uses: actions/upload-artifact@v4
        with:
          name: echo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
