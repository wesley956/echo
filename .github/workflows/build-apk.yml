name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4J      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: "template"
      - uses: android-actions/setup-android@v3
      - run: nom install
      - run: echo "{}" > -z-ai-config
      - run: npx run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - run: npx cap add android
      - run: npx cap sync android
      - run: cd android && ./gradtew assembleDebug
      - uses: actions/upload-artifact4
        with:
          name: echo-apk
          path: android/app/build/outputs/apk/debug/echo-debug.apk